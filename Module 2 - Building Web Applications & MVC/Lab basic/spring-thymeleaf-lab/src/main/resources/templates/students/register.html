<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Register Student</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
            line-height: 1.6;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
            border: 1px solid #ddd;
            border-radius: 5px;
        }
        h1 {
            color: #3498db;
            margin-bottom: 30px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #333;
        }
        input, select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            box-sizing: border-box;
            font-size: 16px;
        }
        input:focus, select:focus {
            outline: none;
            border-color: #3498db;
            box-shadow: 0 0 5px rgba(52, 152, 219, 0.3);
        }
        .error {
            color: #e74c3c;
            font-size: 0.9em;
            margin-top: 5px;
        }
        .btn {
            display: inline-block;
            padding: 12px 24px;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            transition: background-color 0.3s;
        }
        .btn:hover {
            background-color: #2980b9;
        }
        .btn-cancel {
            background-color: #95a5a6;
            margin-left: 10px;
            text-decoration: none;
            padding: 12px 24px;
            color: white;
        }
        .btn-cancel:hover {
            background-color: #7f8c8d;
        }
        .required-field {
            color: #e74c3c;
            margin-left: 3px;
        }
        .hint {
            font-size: 0.9em;
            color: #777;
            margin-top: 3px;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>Register Student</h1>

    <form th:action="@{/students/register}" th:object="${student}" method="post">
        <div class="form-group">
            <label for="name">Name <span class="required-field">*</span></label>
            <input type="text" th:field="*{name}" id="name" placeholder="Enter full name"/>
            <div th:if="${#fields.hasErrors('name')}" class="error" th:errors="*{name}">
                Name Error
            </div>
            <div class="hint">Minimum 2 characters</div>
        </div>

        <div class="form-group">
            <label for="email">Email <span class="required-field">*</span></label>
            <input type="email" th:field="*{email}" id="email" placeholder="Enter email address"/>
            <div th:if="${#fields.hasErrors('email')}" class="error" th:errors="*{email}">
                Email Error
            </div>
        </div>

        <div class="form-group">
            <label for="major">Major <span class="required-field">*</span></label>
            <select th:field="*{major}" id="major">
                <option value="">Select a major</option>
                <option value="Computer Science">Computer Science</option>
                <option value="Information Technology">Information Technology</option>
                <option value="Data Science">Data Science</option>
                <option value="Software Engineering">Software Engineering</option>
                <option value="Cybersecurity">Cybersecurity</option>
                <option value="Artificial Intelligence">Artificial Intelligence</option>
            </select>
            <div th:if="${#fields.hasErrors('major')}" class="error" th:errors="*{major}">
                Major Error
            </div>
        </div>

        <div class="form-group">
            <button type="submit" class="btn">Register</button>
            <a th:href="@{/students/list}" class="btn btn-cancel">Cancel</a>
        </div>
    </form>
</div>
</body>
</html>
