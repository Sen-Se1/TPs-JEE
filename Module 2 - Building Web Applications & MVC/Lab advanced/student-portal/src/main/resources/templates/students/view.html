<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="fragments/layout :: layout(~{::title}, ~{::main})">
<head>
    <title th:text="${'Student - ' + student.name}">Student Details</title>
</head>
<body>
<main>
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2><i class="bi bi-person-badge-fill me-2"></i>Student Details</h2>
        <div>
            <a th:href="@{/students}" class="btn btn-secondary me-2">
                <i class="bi bi-arrow-left me-2"></i>Back to List
            </a>
            <a th:href="@{/students/edit/{id}(id=${student.id})}" class="btn btn-warning">
                <i class="bi bi-pencil-fill me-2"></i>Edit
            </a>
        </div>
    </div>

    <div class="card">
        <div class="card-header bg-primary text-white">
            <h4 class="mb-0" th:text="${student.name}">John Doe</h4>
        </div>
        <div class="card-body">
            <div class="row">
                <div class="col-md-6">
                    <table class="table table-borderless">
                        <tr>
                            <th width="120">ID:</th>
                            <td th:text="${student.id}">1</td>
                        </tr>
                        <tr>
                            <th>Name:</th>
                            <td th:text="${student.name}">John Doe</td>
                        </tr>
                        <tr>
                            <th>Age:</th>
                            <td th:text="${student.age}">21</td>
                        </tr>
                    </table>
                </div>
                <div class="col-md-6">
                    <table class="table table-borderless">
                        <tr>
                            <th width="120">Email:</th>
                            <td th:text="${student.email}">john@example.com</td>
                        </tr>
                        <tr>
                            <th>Course:</th>
                            <td th:text="${student.course}">Computer Science</td>
                        </tr>
                        <tr>
                            <th>Student ID:</th>
                            <td th:text="${student.studentId}">CS123456</td>
                        </tr>
                    </table>
                </div>
            </div>
        </div>
    </div>
</main>
</body>
</html>
