<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="fragments/layout :: layout(~{::title}, ~{::main})">
<head>
    <title th:text="${student.id == null ? 'Add Student' : 'Edit Student'}">Student Form</title>
</head>
<body>
<main>
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 th:text="${student.id == null ? 'Add New Student' : 'Edit Student'}">
            <i class="bi bi-person-plus-fill me-2"></i>Student Form
        </h2>
        <a th:href="@{/students}" class="btn btn-secondary">
            <i class="bi bi-arrow-left me-2"></i>Back to List
        </a>
    </div>

    <div class="card">
        <div class="card-body">
            <form th:action="@{/students/save}" th:object="${student}" method="post" class="needs-validation" novalidate>
                <input type="hidden" th:field="*{id}" />

                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label for="name" class="form-label">Name <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" th:field="*{name}" id="name"
                               th:classappend="${#fields.hasErrors('name')} ? 'is-invalid' : ''" />
                        <div class="invalid-feedback" th:if="${#fields.hasErrors('name')}" th:errors="*{name}">
                            Name Error
                        </div>
                        <small class="text-muted">Minimum 2 characters</small>
                    </div>

                    <div class="col-md-6 mb-3">
                        <label for="age" class="form-label">Age <span class="text-danger">*</span></label>
                        <input type="number" class="form-control" th:field="*{age}" id="age"
                               th:classappend="${#fields.hasErrors('age')} ? 'is-invalid' : ''" />
                        <div class="invalid-feedback" th:if="${#fields.hasErrors('age')}" th:errors="*{age}">
                            Age Error
                        </div>
                        <small class="text-muted">Must be at least 16</small>
                    </div>
                </div>

                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label for="email" class="form-label">Email <span class="text-danger">*</span></label>
                        <input type="email" class="form-control" th:field="*{email}" id="email"
                               th:classappend="${#fields.hasErrors('email')} ? 'is-invalid' : ''" />
                        <div class="invalid-feedback" th:if="${#fields.hasErrors('email')}" th:errors="*{email}">
                            Email Error
                        </div>
                    </div>

                    <div class="col-md-6 mb-3">
                        <label for="course" class="form-label">Course <span class="text-danger">*</span></label>
                        <select class="form-select" th:field="*{course}" id="course"
                                th:classappend="${#fields.hasErrors('course')} ? 'is-invalid' : ''">
                            <option value="">Select a course</option>
                            <option value="Computer Science">Computer Science</option>
                            <option value="Information Technology">Information Technology</option>
                            <option value="Data Science">Data Science</option>
                            <option value="Software Engineering">Software Engineering</option>
                            <option value="Cybersecurity">Cybersecurity</option>
                            <option value="Artificial Intelligence">Artificial Intelligence</option>
                            <option value="Mathematics">Mathematics</option>
                            <option value="Physics">Physics</option>
                            <option value="Chemistry">Chemistry</option>
                            <option value="Biology">Biology</option>
                            <option value="Engineering">Engineering</option>
                        </select>
                        <div class="invalid-feedback" th:if="${#fields.hasErrors('course')}" th:errors="*{course}">
                            Course Error
                        </div>
                    </div>
                </div>

                <div class="mb-3">
                    <label for="studentId" class="form-label">Student ID <span class="text-danger">*</span></label>
                    <input type="text" class="form-control" th:field="*{studentId}" id="studentId"
                           placeholder="e.g., CS123456"
                           th:classappend="${#fields.hasErrors('studentId')} ? 'is-invalid' : ''" />
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('studentId')}" th:errors="*{studentId}">
                        Student ID Error
                    </div>
                    <small class="text-muted">Must be 8 characters with uppercase letters and numbers only</small>
                </div>

                <div class="mt-4">
                    <button type="submit" class="btn btn-primary">
                        <i class="bi bi-check-lg me-2"></i>Save Student
                    </button>
                    <a th:href="@{/students}" class="btn btn-outline-secondary ms-2">
                        <i class="bi bi-x-lg me-2"></i>Cancel
                    </a>
                </div>
            </form>
        </div>
    </div>
</main>
</body>
</html>
