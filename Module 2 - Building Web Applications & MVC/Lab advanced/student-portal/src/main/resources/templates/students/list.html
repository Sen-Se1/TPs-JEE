<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="fragments/layout :: layout(~{::title}, ~{::main})">
<head>
    <title>Students - Student Portal</title>
</head>
<body>
<main>
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2><i class="bi bi-people-fill me-2"></i>Student List</h2>
        <a th:href="@{/students/new}" class="btn btn-primary">
            <i class="bi bi-person-plus-fill me-2"></i>Add New Student
        </a>
    </div>

    <div th:if="${#lists.isEmpty(students)}" class="alert alert-info text-center py-5">
        <i class="bi bi-info-circle-fill me-2" style="font-size: 2rem;"></i>
        <h4 class="mt-3">No students found</h4>
        <p>Please add a student to get started.</p>
        <a th:href="@{/students/new}" class="btn btn-primary mt-2">Add Your First Student</a>
    </div>

    <div th:unless="${#lists.isEmpty(students)}" class="table-responsive">
        <table class="table table-striped table-hover align-middle">
            <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Age</th>
                <th>Email</th>
                <th>Course</th>
                <th>Student ID</th>
                <th>Actions</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="student : ${students}">
                <td th:text="${student.id}">1</td>
                <td th:text="${student.name}">John Doe</td>
                <td th:text="${student.age}">21</td>
                <td th:text="${student.email}">john@example.com</td>
                <td th:text="${student.course}">Computer Science</td>
                <td th:text="${student.studentId}">CS123456</td>
                <td>
                    <div class="btn-group" role="group">
                        <a th:href="@{/students/{id}(id=${student.id})}" class="btn btn-sm btn-info" title="View">
                            <i class="bi bi-eye-fill"></i>
                        </a>
                        <a th:href="@{/students/edit/{id}(id=${student.id})}" class="btn btn-sm btn-warning" title="Edit">
                            <i class="bi bi-pencil-fill"></i>
                        </a>
                        <a th:href="@{/students/delete/{id}(id=${student.id})}"
                           class="btn btn-sm btn-danger"
                           title="Delete"
                           onclick="return confirm('Are you sure you want to delete this student? This action cannot be undone.');">
                            <i class="bi bi-trash-fill"></i>
                        </a>
                    </div>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</main>
</body>
</html>
